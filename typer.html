<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Terminal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0a0a;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Fira Code',monospace;
}

.terminal{
  width:100%;
  max-width:750px;
  background:#0d1117;
  border-radius:12px;
  border:1px solid #30363d;
  overflow:hidden;
  cursor:text;
}

.term-bar{
  background:#1f2328;
  padding:12px;
  display:flex;
  gap:8px;
}

.dot{width:12px;height:12px;border-radius:50%}
.red{background:#ff5f57}
.yellow{background:#ffbd2e}
.green{background:#28c840}

.term-body{
  padding:20px;
  min-height:350px;
  max-height:400px;
  overflow-y:auto;
}

.line{
  color:#e6edf3;
  line-height:1.8;
}

.prompt{color:#7ee787}

.cursor{
  display:inline-block;
  width:2px;
  height:1.1em;
  background:#e6edf3;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

.output{
  color:#8b949e;
  opacity:0;
  transform:translateY(5px);
  animation:fade 0.4s forwards;
}

@keyframes fade{
  to{opacity:1; transform:translateY(0);}
}

.keyword{color:#ff7b72}
.string{color:#a5d6ff}
.func{color:#d2a8ff}
.comment{color:#8b949e}
</style>
</head>

<body>

<div class="terminal" id="terminal">
  <div class="term-bar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
  </div>

  <div class="term-body" id="body">
    <div id="output"></div>

    <div class="line">
      <span class="prompt">❯ </span>
      <span id="input"></span><span class="cursor"></span>
    </div>
  </div>
</div>

<script>
const terminal = document.getElementById("terminal");
const inputEl = document.getElementById("input");
const outputEl = document.getElementById("output");
const body = document.getElementById("body");

let input = "";
let isFocused = true;

// COMMANDS
const commands = {
  "help": "Available: help, clear, build, deploy, hello",
  "build": "⚙️ Building project... Done ✔",
  "deploy": "🚀 Deploying... Live at https://site.dev",
  "hello": "Hi Prem 😏 Welcome back dev!"
};

// CLICK TO FOCUS
terminal.addEventListener("click", () => {
  isFocused = true;
});

// TYPING
document.addEventListener("keydown", (e) => {
  if (!isFocused) return;

  if (e.key.length === 1 && !e.ctrlKey) {
    input += e.key;
    animateTyping();
  } 
  else if (e.key === "Backspace") {
    input = input.slice(0, -1);
    inputEl.textContent = input;
  } 
  else if (e.key === "Enter") {
    runCommand(input.trim());
    input = "";
    inputEl.textContent = "";
  }
});

// TYPING ANIMATION
function animateTyping() {
  inputEl.style.transform = "scale(1.05)";
  setTimeout(()=> inputEl.style.transform="scale(1)",100);
  inputEl.textContent = input;
}

// RUN COMMAND
function runCommand(cmd) {

  // show typed line
  const line = document.createElement("div");
  line.className = "line";
  line.innerHTML = `<span class="prompt">❯ </span>${cmd}`;
  outputEl.appendChild(line);

  if (cmd === "clear") {
    outputEl.innerHTML = "";
    return;
  }

  // output
  const out = document.createElement("div");
  out.className = "output";
  out.innerHTML = commands[cmd] || "Command not found ❌";
  outputEl.appendChild(out);

  // auto scroll
  body.scrollTop = body.scrollHeight;
}
</script>

</body>
</html>
