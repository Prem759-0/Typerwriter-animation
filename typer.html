<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Terminal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0a0a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Fira Code',monospace;
  padding:40px
}

.terminal{
  background:#0d1117;
  border:1px solid #30363d;
  border-radius:12px;
  width:100%;
  max-width:700px;
  overflow:hidden
}

.term-bar{
  background:#1f2328;
  padding:12px 16px;
  display:flex;
  align-items:center;
  gap:8px
}

.dot{width:12px;height:12px;border-radius:50%}
.dot.red{background:#ff5f57}
.dot.yellow{background:#ffbd2e}
.dot.green{background:#28c840}

.term-title{
  color:#8b949e;
  font-size:0.75rem;
  margin-left:auto;
  margin-right:auto
}

.term-body{
  padding:24px;
  min-height:300px;
  max-height:400px;
  overflow-y:auto
}

.line{
  color:#e6edf3;
  font-size:1rem;
  line-height:1.8;
  min-height:1.8em
}

.prompt{color:#7ee787}

.cursor{
  display:inline-block;
  width:2px;
  height:1.1em;
  background:#e6edf3;
  animation:blink 1s step-end infinite;
  vertical-align:text-bottom;
  margin-left:2px
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

.output{
  color:#8b949e;
  font-size:0.875rem;
  margin-bottom:10px
}

.keyword{color:#ff7b72}
.string{color:#a5d6ff}
.func{color:#d2a8ff}
.comment{color:#8b949e}

.btn-row{
  display:flex;
  gap:10px;
  margin-top:20px;
  justify-content:center
}

button{
  background:#21262d;
  border:1px solid #30363d;
  color:#e6edf3;
  padding:8px 20px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Fira Code';
  font-size:0.8rem;
  transition:all 0.3s
}

button:hover{background:#30363d}
</style>
</head>

<body>

<div class="terminal">
  <div class="term-bar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <span class="term-title">nova@studio: ~/projects</span>
  </div>

  <div class="term-body" id="body">
    <div id="output"></div>

    <div class="line">
      <span class="prompt">❯ </span>
      <span id="main"></span>
      <span class="cursor"></span>
    </div>
  </div>
</div>

<div class="btn-row">
  <button onclick="clearTerm()">🗑 Clear</button>
  <button onclick="restart()">↺ Restart</button>
</div>

<script>
const outputDiv = document.getElementById('output');
const main = document.getElementById('main');
const body = document.getElementById('body');

let currentInput = "";

// COMMANDS
const commands = {
  "help": `
Available commands:<br>
- help<br>
- clear<br>
- npm run build<br>
- git commit<br>
- deploy<br>
`,

  "npm run build": `
<span class="comment">// Compiling TypeScript...</span><br>
✓ index.ts compiled<br>
✓ components bundled<br>
✓ styles.css minified<br>
<span class="keyword">Build complete</span> ✨
`,

  "git commit": `
[main <span class="func">a3f9c12</span>] commit successful<br>
3 files changed, 142 insertions(+)
`,

  "deploy": `
Deploying...<br>
<span class="keyword">Success 🚀</span><br>
URL: https://studio.dev
`
};

// KEYBOARD INPUT
document.addEventListener("keydown", (e) => {

  if (e.key.length === 1 && !e.ctrlKey) {
    currentInput += e.key;
  } 
  else if (e.key === "Backspace") {
    currentInput = currentInput.slice(0, -1);
  } 
  else if (e.key === "Enter") {
    runCommand(currentInput.trim());
    currentInput = "";
  }

  main.textContent = currentInput;
});

// RUN COMMAND
function runCommand(cmd) {

  // Show command line
  const cmdLine = document.createElement("div");
  cmdLine.className = "line";
  cmdLine.innerHTML = `<span class="prompt">❯ </span>${cmd}`;
  outputDiv.appendChild(cmdLine);

  // Handle clear
  if (cmd === "clear") {
    outputDiv.innerHTML = "";
    return;
  }

  // Output result
  const div = document.createElement("div");
  div.className = "output";

  div.innerHTML = commands[cmd] || "Command not found ❌";

  outputDiv.appendChild(div);

  // Auto scroll
  body.scrollTop = body.scrollHeight;
}

// BUTTONS
function clearTerm() {
  outputDiv.innerHTML = "";
}

function restart() {
  outputDiv.innerHTML = "";
  currentInput = "";
  main.textContent = "";
}
</script>

</body>
</html>
